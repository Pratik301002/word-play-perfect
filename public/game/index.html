<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#121213" />
<meta name="description" content="A polished 5-letter word game." />
<title>Wordle</title>
<link rel="icon" href="/favicon.ico" />
<link rel="stylesheet" href="style.css?v=2" />
</head>
<body>
<header class="topbar" role="banner">
  <div class="topbar-left">
    <button class="icon-btn" id="statsBtn" aria-label="Statistics" title="Statistics">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="13" width="4" height="8" rx="1"/><rect x="10" y="4" width="4" height="17" rx="1"/><rect x="17" y="10" width="4" height="11" rx="1"/></svg>
    </button>
    <button class="icon-btn" id="helpBtn" aria-label="Help" title="How to play">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M9.5 9.5a2.5 2.5 0 014.5 1.5c0 1.5-2 2-2 3"/><line x1="12" y1="17" x2="12" y2="17"/></svg>
    </button>
  </div>
  <h1 class="title" aria-label="Wordle">WORDLE</h1>
  <div class="topbar-right">
    <button class="icon-btn" id="hintBtn" aria-label="Hint" title="Hint">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18h6"/><path d="M10 21h4"/><path d="M12 3a6 6 0 00-4 10.5c.5.5 1 1.5 1 2.5h6c0-1 .5-2 1-2.5A6 6 0 0012 3z"/></svg>
    </button>
    <button class="icon-btn" id="modeBtn" aria-label="Switch mode" title="Switch mode">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 010 18z" fill="currentColor" stroke="none"/></svg>
    </button>
    <button class="icon-btn" id="settingsBtn" aria-label="Settings" title="Settings">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    </button>
  </div>
</header>
<main class="game" role="main">
  <div class="mode-indicator" id="modeIndicator" aria-live="polite">Daily</div>
  <div class="board" id="board" role="grid" aria-label="Game board"></div>
  <div class="keyboard" id="keyboard" role="group" aria-label="On-screen keyboard"></div>
</main>
<div class="toaster" id="toaster" role="status" aria-live="polite"></div>
<div class="modal-root" id="modalRoot" aria-hidden="true"></div>
<canvas id="confetti" class="confetti" aria-hidden="true"></canvas>
<script src="words.js"></script>
<script src="script.js"></script>
</body>
</html>
